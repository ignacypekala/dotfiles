bindsym $mod+Return exec $term
bindsym $mod+Shift+q kill
bindsym $mod+d exec $menu
bindsym $mod+Shift+c reload
bindsym $mod+Shift+e exec swaynag -t warning -m \
    'You pressed the exit shortcut. Do you really want to exit sway? This will end your Wayland session.' \
    -B 'Yes, exit sway' 'swaymsg exit'

bindsym $mod+$left focus left
bindsym $mod+$down focus down
bindsym $mod+$up focus up
bindsym $mod+$right focus right

# Move windows without losing focus when changing displays.
bindsym $mod+Shift+$left [con_id=__focused__] move left, focus
bindsym $mod+Shift+$down [con_id=__focused__] move down, focus
bindsym $mod+Shift+$up [con_id=__focused__] move up, focus
bindsym $mod+Shift+$right [con_id=__focused__] move right, focus

bindsym $mod+Shift+n [con_id=__focused__] move output left, focus

bindsym $mod+1 workspace number 1
bindsym $mod+2 workspace number 2
bindsym $mod+3 workspace number 3
bindsym $mod+4 workspace number 4
bindsym $mod+5 workspace number 5
bindsym $mod+6 workspace number 6
bindsym $mod+7 workspace number 7
bindsym $mod+8 workspace number 8
bindsym $mod+9 workspace number 9
bindsym $mod+0 workspace number 10

bindsym $mod+tab workspace next
bindsym $mod+Shift+Tab workspace prev

# Move container to workspace preserving focus;
# https://www.reddit.com/r/swaywm/comments/qb9vrz/move_window_to_workspace_focus/
bindsym Shift+$mod+1 [con_id=__focused__] move to workspace 1, focus
bindsym Shift+$mod+2 [con_id=__focused__] move to workspace 2, focus
bindsym Shift+$mod+3 [con_id=__focused__] move to workspace 3, focus
bindsym Shift+$mod+4 [con_id=__focused__] move to workspace 4, focus
bindsym Shift+$mod+5 [con_id=__focused__] move to workspace 5, focus
bindsym Shift+$mod+6 [con_id=__focused__] move to workspace 6, focus
bindsym Shift+$mod+7 [con_id=__focused__] move to workspace 7, focus
bindsym Shift+$mod+8 [con_id=__focused__] move to workspace 8, focus
bindsym Shift+$mod+9 [con_id=__focused__] move to workspace 9, focus
bindsym Shift+$mod+0 [con_id=__focused__] move to workspace 10, focus

bindsym $mod+b splith
bindsym $mod+v splitv
bindsym $mod+e layout toggle split

bindsym $mod+f fullscreen

bindsym $mod+Shift+space floating toggle
bindsym $mod+space focus mode_toggle

# Move focus to the parent container (?)
bindsym $mod+a focus parent

# Move the currently focused window to the scratchpad
bindsym $mod+Shift+minus move scratchpad
# Cycle through scratchpad windows
bindsym $mod+minus scratchpad show

mode "resize" {
    bindsym $left resize shrink width 10px
        bindsym $down resize grow height 10px
        bindsym $up resize shrink height 10px
        bindsym $right resize grow width 10px
        bindsym Shift+$left resize shrink width 30px
        bindsym Shift+$down resize grow height 30px
        bindsym Shift+$up resize shrink height 30px
        bindsym Shift+$right resize grow width 30px

        # Return to default mode
        bindsym Return mode "default"
        bindsym Escape mode "default"
        bindsym Ctrl+bracketLeft mode "default"
}

bindsym $mod+r mode "resize"

# Special keys to adjust volume via PulseAudio
bindsym --locked XF86AudioMute exec pactl set-sink-mute \@DEFAULT_SINK@ toggle
bindsym --locked XF86AudioLowerVolume exec pactl set-sink-volume \@DEFAULT_SINK@ -5%
bindsym --locked XF86AudioRaiseVolume exec pactl set-sink-volume \@DEFAULT_SINK@ +5%
bindsym --locked XF86AudioMicMute exec pactl set-source-mute \@DEFAULT_SOURCE@ toggle

# Special keys to control media via playerctl
bindsym --locked XF86AudioPlay exec playerctl play-pause
bindsym --locked XF86AudioPause exec playerctl play-pause
bindsym --locked XF86AudioPrev exec playerctl previous
bindsym --locked XF86AudioNext exec playerctl next
bindsym --locked XF86AudioStop exec playerctl stop

# Special keys to adjust brightness via brightnessctl
bindsym --locked XF86MonBrightnessDown exec brightnessctl set 5%-
bindsym --locked XF86MonBrightnessUp exec brightnessctl set 5%+

# Special key to take a screenshot with grim
bindsym Print exec grim
